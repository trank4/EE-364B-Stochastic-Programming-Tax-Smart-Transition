    "pandas (>=3.0.2,<4.0.0)",
    "jupyter (>=1.1.1,<2.0.0)",
    "stochastic-optimizer @ file:///Users/khoatran/Desktop/stanford/ee364b/EE-364B-Stochastic-Programming-Tax-Smart-Transition/packages/stochastic-optimizer",
