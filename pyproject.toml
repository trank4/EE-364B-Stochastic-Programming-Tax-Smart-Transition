    {name = "trank4",email = "khoa.tran.uc@gmail.com"}
]
readme = "README.md"
requires-python = "^3.11"
dependencies = [
    "numpy (>=2.4.4,<3.0.0)",
    "scipy (>=1.17.1,<2.0.0)",
    "cvxpy (>=1.8.2,<2.0.0)",
